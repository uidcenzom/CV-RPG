<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Portfolio World v3.0</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/lz-string/1.5.0/lz-string.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:linear-gradient(160deg,#eef1fb 0%,#f6f0fc 100%);display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;overflow:hidden;font-family:'Nunito',system-ui,sans-serif;color:#222a3d}
#wrap{position:relative;user-select:none;background:#fff;border-radius:22px;box-shadow:0 18px 50px rgba(40,52,90,.16);padding:12px}
#titlebar{display:flex;justify-content:space-between;align-items:center;gap:12px;padding:6px 8px 10px;font-size:15px;font-weight:900}
#titlebar .ttl{letter-spacing:-.3px}
#zoneLabel{color:#6d6bf6;font-weight:800;font-size:13px}
#posLabel{color:#9aa2b4;font-weight:800;font-size:13px}
#gameCanvas{display:block;image-rendering:pixelated;image-rendering:crisp-edges;border-radius:14px;border:1px solid #e7eaf2;box-shadow:0 8px 24px rgba(40,52,90,.12)}
#ctrlbar{display:flex;gap:14px;flex-wrap:wrap;align-items:center;padding:12px 6px 4px;color:#6b7488;font-size:13px;font-weight:700}
.ch{display:flex;align-items:center;gap:6px}
.kbd{background:#f5f7fb;border:1px solid #e2e6f0;border-bottom:2px solid #d7dcea;padding:3px 9px;border-radius:8px;color:#4a5163;font-size:12px;font-weight:800;font-family:inherit}
.importbtn{margin-left:auto;color:#6d6bf6;text-decoration:none;border:1.5px solid #d9d8fb;background:#f3f3ff;padding:8px 16px;border-radius:999px;font-weight:800;font-size:13px;font-family:inherit;cursor:pointer;transition:.15s}
.importbtn:hover{background:#6d6bf6;color:#fff;border-color:#6d6bf6}
#modal{display:none;position:absolute;inset:0;background:rgba(28,32,54,.55);backdrop-filter:blur(3px);align-items:center;justify-content:center;z-index:20;opacity:0;transition:opacity .25s;border-radius:22px}
#modal.open{display:flex;opacity:1}
.mbox{background:#fff;border-radius:20px;border-top:6px solid var(--accent,#6d6bf6);box-shadow:0 24px 60px rgba(20,24,45,.45);padding:26px 28px;width:680px;max-width:92%;max-height:88%;overflow-y:auto;transform:translateY(12px) scale(.98);transition:transform .25s}
.open .mbox{transform:none}
.mbox::-webkit-scrollbar{width:8px}.mbox::-webkit-scrollbar-thumb{background:#d7dcea;border-radius:8px}
.mtitle{color:var(--accent-dim,#4a4f63);font-size:24px;font-weight:900;margin-bottom:3px;display:flex;align-items:center;gap:11px;letter-spacing:-.3px}
.mdot{width:13px;height:13px;border-radius:50%;background:var(--accent,#6d6bf6);flex-shrink:0}
.msubtitle{color:#9aa2b4;font-size:13px;font-weight:700;margin-bottom:22px}
.pgrid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px}
.pc{background:#f7f8fc;border:1px solid #e7eaf2;border-radius:14px;padding:18px;transition:border-color .18s,transform .18s,box-shadow .18s}
.pc:hover{border-color:var(--accent,#6d6bf6);transform:translateY(-2px);box-shadow:0 10px 24px rgba(40,52,90,.10)}
.pnum{font-size:12px;color:#9aa2b4;font-weight:800;margin-bottom:7px}
.ptyp{font-size:11px;font-weight:800;background:var(--accent-dim,#6d6bf6);color:#fff;padding:4px 11px;border-radius:999px;display:inline-block;margin-bottom:11px}
.pname{font-size:17px;font-weight:800;color:#222a3d;margin-bottom:9px;line-height:1.35}
.pdesc{font-size:13.5px;color:#5b6377;line-height:1.65;margin-bottom:11px;font-weight:600}
.ptags{display:flex;flex-wrap:wrap;gap:7px}
.ptag{font-size:11.5px;font-weight:700;border:1px solid #e2e6f0;background:#fff;color:#5b6377;padding:4px 11px;border-radius:999px}
.plink{display:inline-block;margin-top:12px;font-size:12.5px;font-weight:800;color:#fff;background:var(--accent-dim,#6d6bf6);text-decoration:none;padding:8px 15px;border-radius:999px;word-break:break-all}
.mclose{background:#f5f7fb;border:1.5px solid #e2e6f0;color:#4a5163;font-family:inherit;font-weight:800;font-size:13px;padding:11px 20px;border-radius:999px;cursor:pointer;transition:.15s;float:right;margin-top:8px}
.mclose:hover{background:#222a3d;color:#fff;border-color:#222a3d}
#loading{position:absolute;inset:0;background:#fff;display:flex;align-items:center;justify-content:center;z-index:50;color:#6d6bf6;font-size:16px;font-weight:800;font-family:inherit;border-radius:22px}
/* ── Responsive ── */
#wrap{width:min(96vw,844px);min-width:0}
#gameCanvas{width:100%;max-width:100%;min-width:0;height:auto}
#zoneLabel{flex:1;text-align:center;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;min-width:0}
@media (max-width:560px){
  body{padding:0}
  #wrap{width:100vw;min-height:100vh;border-radius:0;padding:8px;display:flex;flex-direction:column;justify-content:center}
  #titlebar{font-size:13px;padding:6px}
  #zoneLabel,#posLabel{font-size:11px}
  .pgrid{grid-template-columns:1fr}
  .mbox{padding:20px 18px}
  .mtitle{font-size:20px}
  #modal{border-radius:0}
}
/* ── Controlli touch (mobile) ── */
#touchControls{display:none}
body.touch #touchControls{display:block}
body.touch .ch{display:none}
#joyBase{position:fixed;left:20px;bottom:26px;width:130px;height:130px;border-radius:50%;
  background:rgba(255,255,255,.30);border:2px solid rgba(109,107,246,.55);backdrop-filter:blur(4px);
  touch-action:none;z-index:40;box-shadow:0 8px 22px rgba(40,52,90,.20)}
#joyKnob{position:absolute;left:50%;top:50%;width:58px;height:58px;margin:-29px 0 0 -29px;border-radius:50%;
  background:linear-gradient(90deg,#6d6bf6,#9b6bf6);box-shadow:0 4px 14px rgba(109,107,246,.55)}
#btnEnter{position:fixed;right:22px;bottom:42px;width:88px;height:88px;border-radius:50%;border:none;
  background:linear-gradient(90deg,#6d6bf6,#9b6bf6);color:#fff;font-family:inherit;font-weight:800;font-size:15px;
  box-shadow:0 8px 22px rgba(109,107,246,.5);touch-action:none;z-index:40;cursor:pointer;transition:opacity .2s,transform .1s}
#btnEnter:active{transform:scale(.94)}
#btnEnter.dim{opacity:.4}
/* ── Modalità Modifica ── */
#editBar{display:none;align-items:center;gap:8px;flex-wrap:wrap;padding:8px 6px 2px}
#editBar .lab{font-weight:800;color:#6d6bf6;font-size:14px}
#editBar button{font-family:inherit;font-weight:800;font-size:13px;border-radius:10px;padding:8px 14px;cursor:pointer;border:1.5px solid #e2e6f0;background:#f5f7fb;color:#222a3d;transition:.15s}
#editBar button:hover{border-color:#6d6bf6;color:#6d6bf6}
#editBar #editSave{background:linear-gradient(90deg,#6d6bf6,#9b6bf6);color:#fff;border:none}
#editBar #editPlay{background:#16a34a;color:#fff;border:none}
#editBar a{margin-left:auto;font-size:12px;color:#9aa2b4;text-decoration:none;font-weight:700}
#editPanel{display:none;position:absolute;inset:0;z-index:40;background:rgba(28,32,54,.55);backdrop-filter:blur(3px);align-items:center;justify-content:center;border-radius:22px}
#editPanel.open{display:flex}
.epbox{background:#fff;border-radius:18px;box-shadow:0 24px 60px rgba(20,24,45,.45);padding:22px 24px;width:440px;max-width:92%;max-height:90%;overflow:auto}
.epbox h3{font-size:19px;font-weight:900;margin-bottom:14px;color:#222a3d}
.epbox label{display:block;font-size:12.5px;font-weight:700;color:#6b7488;margin-bottom:10px}
.epbox input,.epbox select,.epbox textarea{width:100%;margin-top:4px;background:#f5f7fb;border:1.5px solid #e7eaf2;border-radius:10px;padding:9px 11px;font-family:inherit;font-size:14px;color:#222a3d}
.epbox textarea{min-height:60px;resize:vertical}
.eprow{display:flex;gap:10px}.eprow label{flex:1}
.epbtns{display:flex;align-items:center;gap:8px;margin-top:6px}
.epbtns button{font-family:inherit;font-weight:800;font-size:13px;border-radius:10px;padding:9px 16px;cursor:pointer;border:1.5px solid #e2e6f0;background:#f5f7fb;color:#222a3d}
.epbtns .prim{background:linear-gradient(90deg,#6d6bf6,#9b6bf6);color:#fff;border:none}
.epbtns .del{background:#fff5f5;border-color:#f3c2c2;color:#ef4444}
body.editing #touchControls{display:none!important}
</style>
</head>
<body>
<div id="wrap">
  <div id="titlebar">
    <span class="ttl">🗺️ Portfolio World</span>
    <span id="zoneLabel">Mappa principale</span>
    <span id="posLabel">(0,0)</span>
  </div>
  <div id="editBar">
    <span class="lab">✏️ Modifica</span>
    <button id="editAdd">➕ Aggiungi edificio</button>
    <button id="editSave">💾 Salva</button>
    <button id="editPlay">▶ Prova</button>
    <a href="editor.html">Editor tile avanzato →</a>
  </div>
  <canvas id="gameCanvas" width="820" height="500"></canvas>
  <div id="ctrlbar">
    <span class="ch"><span class="kbd">W</span><span class="kbd">A</span><span class="kbd">S</span><span class="kbd">D</span>Muovi</span>
    <span class="ch"><span class="kbd">↑↓←→</span>Muovi</span>
    <span class="ch"><span class="kbd">E</span>Entra</span>
    <span class="ch"><span class="kbd">ESC</span>Chiudi</span>
    <button class="importbtn" id="regenBtn" type="button">🎲 Rigenera</button>
    <a class="importbtn" href="cv-builder.html" style="margin-left:8px">✨ Crea il tuo</a>
  </div>
  <div id="modal"><div class="mbox" id="modalContent"></div></div>
  <div id="editPanel"><div class="epbox">
    <h3>Modifica edificio</h3>
    <label>Ente / Nome<input id="epOrg"></label>
    <label>Titolo / Ruolo<input id="epTitle"></label>
    <label>Tipo<select id="epKind"><option value="education">Studi</option><option value="work">Lavoro</option><option value="project">Progetto</option></select></label>
    <div class="eprow"><label>Inizio<input id="epStart"></label><label>Fine<input id="epEnd"></label></div>
    <label>Descrizione<textarea id="epDesc"></textarea></label>
    <label>Competenze / Tag (virgola)<input id="epTags"></label>
    <label>Link<input id="epLink"></label>
    <div class="epbtns"><button id="epDelete" class="del">Elimina</button><span style="flex:1"></span><button id="epClose">Annulla</button><button id="epSave" class="prim">Salva</button></div>
  </div></div>
  <div id="touchControls">
    <div id="joyBase"><div id="joyKnob"></div></div>
    <button id="btnEnter">Entra</button>
  </div>
  <div id="loading">Caricamento…</div>
</div>
<script>
const canvas=document.getElementById('gameCanvas');
const ctx=canvas.getContext('2d');
ctx.imageSmoothingEnabled=false;
const CW=820,CH=500,TILE=32;
let MW=48,MH=30; // ridimensionati dinamicamente da layoutBuildings()

// ═══ TILESET CONFIGURABILE (pacchetti / URL / reskin per chi forka) ═══
// Un tileset è una CARTELLA (locale o URL) con la STESSA struttura di 'tiles/'.
// Priorità della base: link condiviso (#t) > localStorage > window.PW_TILESET (config.js) > 'tiles/'.
const SHARED=(function(){const p=decodeSharedHash();if(!p)return null;return Array.isArray(p)?{e:p,v:0,t:'',m:null,s:null}:{e:p.e,v:+p.v||0,t:p.t||'',m:p.m||null,s:p.s||null};})();
function resolveTileset(){
  let base=(SHARED&&SHARED.t)||'';
  if(!base){try{base=localStorage.getItem('pw_tileset')||'';}catch(e){}}
  if(!base&&window.PW_TILESET)base=window.PW_TILESET;
  base=base||'tiles/';
  return /\/$/.test(base)?base:base+'/';
}
const TILESET_BASE=resolveTileset();

// ═══ MAPPA CUSTOM (dall'editor): nel link (#m) o in localStorage 'pw_map' ═══
// Formato: {w,h, sheets:[relPath], layers:[[[x,y,s,sx,sy,sw,sh,c],...]], spawn:[x,y], portals:[[x,y],...]}
const CUSTOM=(function(){
  if(SHARED&&SHARED.m)return SHARED.m;
  try{const r=localStorage.getItem('pw_map'); if(r){const j=JSON.parse(r); if(j&&j.layers&&j.w)return j;}}catch(e){}
  return null;
})();
const customMode=!!CUSTOM;

// ═══ IMAGE LOADING ═══
const IMG={};
const B=TILESET_BASE;
const paths={
  floors:B+'Environment/Tilesets/Floors_Tiles.png',
  water:B+'Environment/Tilesets/Water_tiles.png',
  bwalls:B+'Environment/Structures/Buildings/Walls.png',
  broofs:B+'Environment/Structures/Buildings/Roofs.png',
  bprops:B+'Environment/Structures/Buildings/Props.png',
  bfloors:B+'Environment/Structures/Buildings/Floors.png',
  trees:B+'Environment/Props/Static/Trees/Model_01/Size_03.png',
  veg:B+'Environment/Props/Static/Vegetation.png',
  rocks:B+'Environment/Props/Static/Rocks.png',
  walkD:B+'Entities/Characters/Body_A/Animations/Walk_Base/Walk_Down-Sheet.png',
  walkS:B+'Entities/Characters/Body_A/Animations/Walk_Base/Walk_Side-Sheet.png',
  walkU:B+'Entities/Characters/Body_A/Animations/Walk_Base/Walk_Up-Sheet.png',
  idleD:B+'Entities/Characters/Body_A/Animations/Idle_Base/Idle_Down-Sheet.png',
  idleS:B+'Entities/Characters/Body_A/Animations/Idle_Base/Idle_Side-Sheet.png',
  idleU:B+'Entities/Characters/Body_A/Animations/Idle_Base/Idle_Up-Sheet.png',
};
function loadImages(cb){
  const entries=Object.entries(paths);
  if(customMode&&Array.isArray(CUSTOM.sheets)) CUSTOM.sheets.forEach((p,i)=>entries.push(['cs'+i, TILESET_BASE+p]));
  let n=0;const tot=entries.length;
  for(const[k,p]of entries){
    const img=new Image();
    img.onload=img.onerror=()=>{n++;if(n===tot)cb();};
    img.src=p;IMG[k]=img;
  }
}

// ═══ TILE TYPES ═══
const T={G:0,G2:1,G3:2,P:3,W:4,TR:5,WL:6,DR:7,RK:8,FL:9,SG:10,RF:11,FN:12,BRG:13};
const SOLID=new Set([T.TR,T.WL,T.RK,T.RF,T.FN]);
const FLOOR_TILES=new Set([T.G,T.G2,T.G3,T.P,T.W,T.BRG]);

// ═══ ESPERIENZE → EDIFICI ═══
// Ogni esperienza del CV diventa un edificio. Lo stile (colore/tetto) dipende dal "kind".
const KIND_STYLE={
  education:{color:'#00D4FF',colorDim:'#006a80',colorRgb:'0,212,255',wallStyle:1,roofIdx:2,label:'FORMAZIONE'},
  work:     {color:'#00FF41',colorDim:'#007a18',colorRgb:'0,255,65', wallStyle:0,roofIdx:1,label:'ESPERIENZA'},
  project:  {color:'#FF41E0',colorDim:'#801070',colorRgb:'255,65,224',wallStyle:3,roofIdx:0,label:'PROGETTO'},
};
const kindStyle=k=>KIND_STYLE[k]||KIND_STYLE.work;

// Dati demo usati finché non viene importato un CV (localStorage 'pw_experiences')
const DEMO_EXPERIENCES=[
  {kind:'education',organization:'Politecnico di Milano',title:'Laurea in Ingegneria Informatica',location:'Milano',start:'2016',end:'2019',description:'Focus su algoritmi, sistemi distribuiti e ingegneria del software.',tags:['Algoritmi','Java','Database','Reti']},
  {kind:'education',organization:'ITIS G. Galilei',title:'Diploma Perito Informatico',location:'Roma',start:'2011',end:'2016',description:'Diploma tecnico in informatica e telecomunicazioni.',tags:['C','HTML','SQL']},
  {kind:'work',organization:'Nexus Digital',title:'Full-Stack Developer',location:'Milano',start:'2019',end:'2022',description:'Sviluppo di piattaforme gestionali ed e-commerce per clienti enterprise.',tags:['React','Node.js','PostgreSQL','Docker']},
  {kind:'work',organization:'Aurora Tech',title:'Backend Engineer',location:'Remote',start:'2022',end:'Oggi',description:'Architetture a microservizi e dashboard real-time ad alta affidabilità.',tags:['Go','Kubernetes','gRPC','Redis']},
];

function buildDesc(e){
  const period=[e.start,e.end].filter(Boolean).join(' – ');
  const head=[];
  if(e.location)head.push('@ '+e.location);
  if(period)head.push(period);
  const meta=head.length?`<span style="color:var(--accent,#00FF41)">${head.join('  ·  ')}</span><br><br>`:'';
  return meta+(e.description||'');
}

// ═══ RNG DETERMINISTICO (seminato dai dati → mondo stabile e condivisibile) ═══
function strHash(s){let h=2166136261>>>0;for(let i=0;i<s.length;i++){h^=s.charCodeAt(i);h=Math.imul(h,16777619);}return h>>>0;}
function mulberry32(a){return function(){a|=0;a=a+0x6D2B79F5|0;let t=Math.imul(a^a>>>15,1|a);t=t+Math.imul(t^t>>>7,61|t)^t;return((t^t>>>14)>>>0)/4294967296;};}
function makeRng(seed){const f=mulberry32(seed>>>0);const r=()=>f();r.int=n=>Math.floor(f()*n);r.pick=a=>a[Math.floor(f()*a.length)];return r;}

// ═══ LAYOUT e TEMI disponibili (scelti dal seme) ═══
const LAYOUTS=['grid','districts','timeline'];
const THEMES=[
  {name:'Prato',   edge:'#3a6830', tint:null,                     tree:7, rock:3, flower:7, night:false},
  {name:'Bosco',   edge:'#2c5226', tint:'rgba(18,55,22,0.22)',    tree:17,rock:3, flower:9, night:false},
  {name:'Notte',   edge:'#10131f', tint:'rgba(18,26,66,0.44)',    tree:8, rock:3, flower:5, night:true},
  {name:'Deserto', edge:'#7a6a3a', tint:'rgba(196,156,84,0.32)',  tree:2, rock:10,flower:3, night:false},
  {name:'Neve',    edge:'#cdd6e6', tint:'rgba(228,238,255,0.46)', tree:4, rock:6, flower:2, night:false},
];

// ═══ ESPERIENZE → EDIFICI ═══
const BW=9,BH=6,MARGIN=3,TOP=5,GAPX=4,GAPY=6;
const MAXW=BW+2, MAXH=BH+1, CELLW=MAXW+GAPX, CELLH=MAXH+GAPY;  // celle uniformi: anche edifici grandi non si toccano
function expYear(s){const m=String(s||'').match(/(19|20)\d{2}/);return m?+m[0]:null;}
function expDuration(e){let a=expYear(e.start),b=expYear(e.end); if(b==null&&/oggi|attual|present|current|in corso|ongoing|presente/i.test(String(e.end)))b=a!=null?a+3:null; return (a!=null&&b!=null)?Math.max(0,b-a):1;}

function makeBuilding(e,i,rng){
  const st=kindStyle(e.kind);
  const nm=String(e.organization||'SENZA NOME').toUpperCase();
  const boost=Math.min(2,Math.floor(expDuration(e)/3)); // esperienze lunghe → edifici più grandi
  return {
    name: nm.length>20?nm.slice(0,19)+'…':nm, kind:e.kind, exp:e, x:0, y:0,
    w:BW+boost, h:BH+(boost>=2?1:0),
    color:st.color, colorDim:st.colorDim, colorRgb:st.colorRgb,
    wallStyle:rng.pick([0,1,3]), roofIdx:st.roofIdx,   // texture muro variata
    projects:[{num:String(i+1).padStart(3,'0'),type:st.label,name:String(e.title||e.organization||''),desc:buildDesc(e),tags:Array.isArray(e.tags)?e.tags:[],link:e.link||''}]
  };
}
// Aggiorna i campi visivi di un edificio dai dati dell'esperienza (dopo una modifica)
function refreshBuilding(b,i){
  const e=b.exp, st=kindStyle(e.kind), nm=String(e.organization||'SENZA NOME').toUpperCase();
  b.kind=e.kind; b.name=nm.length>20?nm.slice(0,19)+'…':nm;
  b.color=st.color; b.colorDim=st.colorDim; b.colorRgb=st.colorRgb; b.roofIdx=st.roofIdx;
  b.projects=[{num:String((i||0)+1).padStart(3,'0'),type:st.label,name:String(e.title||e.organization||''),desc:buildDesc(e),tags:Array.isArray(e.tags)?e.tags:[],link:e.link||''}];
}

function layoutBuildings(exps, layout, rng){
  const kindOrder={education:0,work:1,project:2};
  const ordered = layout==='timeline'
    ? [...exps].sort((a,b)=>((expYear(a.start)??9999)-(expYear(b.start)??9999)))
    : [...exps].sort((a,b)=>((kindOrder[a.kind]??1)-(kindOrder[b.kind]??1)));
  const arr=ordered.map((e,i)=>makeBuilding(e,i,rng));
  const n=arr.length;
  if(layout==='districts'){           // quartieri: una colonna per tipo
    const kinds=['education','work','project'].filter(k=>arr.some(b=>b.kind===k));
    const col={}; kinds.forEach((k,ci)=>col[k]=ci); const cnt={};
    arr.forEach(b=>{const ci=col[b.kind], ri=(cnt[b.kind]=(cnt[b.kind]||0)); cnt[b.kind]++; b.x=MARGIN+ci*CELLW; b.y=TOP+ri*CELLH;});
    const maxRows=Math.max(1,...kinds.map(k=>arr.filter(b=>b.kind===k).length));
    MW=Math.max(24,MARGIN*2+kinds.length*CELLW); MH=Math.max(18,TOP+maxRows*CELLH+4);
  } else if(layout==='timeline'){     // serpentina cronologica
    const cols=Math.min(4,Math.max(2,Math.ceil(Math.sqrt(n))));
    arr.forEach((b,i)=>{const r=Math.floor(i/cols); let c=i%cols; if(r%2)c=cols-1-c; b.x=MARGIN+c*CELLW; b.y=TOP+r*CELLH;});
    const rows=Math.ceil(n/cols)||1; MW=Math.max(24,MARGIN*2+cols*CELLW); MH=Math.max(18,TOP+rows*CELLH+4);
  } else {                            // griglia (campus)
    const cols=Math.min(4,Math.max(1,Math.ceil(Math.sqrt(n))));
    arr.forEach((b,i)=>{const r=Math.floor(i/cols),c=i%cols; b.x=MARGIN+c*CELLW; b.y=TOP+r*CELLH;});
    const rows=Math.ceil(n/cols)||1; MW=Math.max(24,MARGIN*2+cols*CELLW); MH=Math.max(18,TOP+rows*CELLH+4);
  }
  return arr;
}

function b64urlDecode(s){s=s.replace(/-/g,'+').replace(/_/g,'/');return decodeURIComponent(escape(atob(s)));}
function decodeSharedHash(){
  const h=location.hash.slice(1); if(!h)return null;
  const params=new URLSearchParams(h);
  try{
    if(params.has('lz')&&window.LZString){const j=LZString.decompressFromEncodedURIComponent(params.get('lz')); if(j)return JSON.parse(j);}
    if(params.has('p')) return JSON.parse(b64urlDecode(params.get('p')));
  }catch(e){}
  return null;
}
function encodeShare(e,v,t,s){const o={e,v}; if(t && t!=='tiles/') o.t=t; if(s) o.s=s; const json=JSON.stringify(o); if(window.LZString)return 'lz='+LZString.compressToEncodedURIComponent(json); return 'p='+btoa(unescape(encodeURIComponent(json))).replace(/\+/g,'-').replace(/\//g,'_').replace(/=+$/,'');}

  worldVariant=((Math.round(v)%1000)+1000)%1000;

// ═══ MAP (generata da edifici + tema, decorazioni seminate) ═══
function makeMap(theme,decorSalt){
  const m=Array.from({length:MH},()=>Array(MW).fill(T.G));
  const s=(y,x,t)=>{if(y>=0&&y<MH&&x>=0&&x<MW)m[y][x]=t};
  const h=(x,y)=>(((x*374761393+y*668265263)>>>0)%3);
  for(let y=0;y<MH;y++)for(let x=0;x<MW;x++){const v=h(x,y);if(v===1)m[y][x]=T.G2;else if(v===2)m[y][x]=T.G3;}
  for(let y=0;y<MH;y++)for(let x=0;x<MW;x++)if(y<2||y>=MH-2||x<2||x>=MW-2)s(y,x,T.TR);

  const reserved=Array.from({length:MH},()=>Array(MW).fill(false));
  const reserve=(y,x)=>{if(y>=0&&y<MH&&x>=0&&x<MW)reserved[y][x]=true;};
  buildings.forEach(b=>{
    for(let x=b.x;x<b.x+b.w;x++)s(b.y,x,T.RF);
    for(let y=b.y+1;y<b.y+b.h;y++)for(let x=b.x;x<b.x+b.w;x++)s(y,x,T.WL);
    const dc=b.x+Math.floor(b.w/2);
    b.doorX=dc;b.doorY=b.y+b.h-1;
    s(b.doorY,dc,T.DR);s(b.doorY,dc+1,T.DR);
    b.signX=dc;b.signY=b.y+b.h+1;
    s(b.signY,b.signX,T.SG);
    for(let y=b.y-4;y<=b.y+b.h+2;y++)for(let x=b.x-1;x<=b.x+b.w;x++)reserve(y,x);  // include la zona del tetto (niente alberi/rocce tagliati)
  });

  // Strade: viale orizzontale sotto ogni fila + connettore da ogni porta + spina sinistra
  const avenues=[...new Set(buildings.map(b=>b.y))].sort((a,b)=>a-b).map(by=>by+MAXH+2);
  avenues.forEach(avY=>{for(let x=2;x<MW-2;x++){s(avY,x,T.P);s(avY+1,x,T.P);}});
  buildings.forEach(b=>{const avY=b.y+MAXH+2; for(let y=b.y+b.h;y<=avY+1;y++){s(y,b.doorX,T.P);s(y,b.doorX+1,T.P);}});
  if(avenues.length>1){const minY=Math.min(...avenues),maxY=Math.max(...avenues)+1; for(let y=minY;y<=maxY;y++){s(y,2,T.P);s(y,3,T.P);}}

  // Decorazioni: densità/mix dipendono dal tema, posizione dal seme (decorSalt)
  const sc=(x,y)=>(((x*73856093)^(y*19349663)^decorSalt)>>>0)%100;
  const tT=theme.tree, tR=tT+theme.rock, tF=tR+theme.flower;
  for(let y=2;y<MH-2;y++)for(let x=2;x<MW-2;x++){
    if(reserved[y][x])continue;
    const t=m[y][x]; if(t!==T.G&&t!==T.G2&&t!==T.G3)continue;
    const r=sc(x,y);
    if(r<tT)s(y,x,T.TR); else if(r<tR)s(y,x,T.RK); else if(r<tF)s(y,x,T.FL);
  }
  return m;
}

function getBuildingByDoor(tx,ty){
  for(let i=0;i<buildings.length;i++){
    const b=buildings[i],dc=b.x+Math.floor(b.w/2);
    if(ty===b.y+b.h-1&&(tx===dc||tx===dc+1))return i;
  }
  return -1;
}

// ═══ PRE-RENDERED BUILDINGS (walls + roof + door + windows) ═══
const bldgSprites=[];

function prerenderBuildings(){
  // Walls.png: 7 styles each 96px wide. Rows: y=16 top, y=32/48 body, y=128 bottom
  // Roofs.png: brown(0,60,140,80), green(140,60,140,80), blue(280,87,88,73)
  // Props.png: Door2(32,20,32,44), Window2(134,27,20,37), WindowBlue(48,64,32,36)

  buildings.forEach((b,i)=>{
    const bw=b.w*TILE, bh=b.h*TILE;
    const roofH=Math.round(TILE*2.5);
    const ovX=TILE; // horizontal roof overhang
    const cw=bw+ovX*2, ch=bh+roofH;

    const cv=document.createElement('canvas');
    cv.width=cw; cv.height=ch;
    const cx=cv.getContext('2d');
    cx.imageSmoothingEnabled=false;

    const stX=b.wallStyle*96; // style X offset in Walls.png

    // ── Muri PIENI: campiona lo strip di muro solido (niente centro trasparente) ──
    for(let row=0;row<b.h;row++){
      for(let col=0;col<b.w;col++){
        const sx=stX+16+(((col+row)%3)*16), sy=208; // striscia di muro pieno
        cx.drawImage(IMG.bwalls,sx,sy,16,16, ovX+col*TILE, roofH+row*TILE, TILE,TILE);
      }
    }

    // ── Finestre (finestra blu di Props: 48,64,32,36), griglia regolare, dentro il tile ──
    const dc=Math.floor(b.w/2);
    const winW=Math.round(TILE*0.62), winH=Math.round(TILE*0.72);
    for(let row=1; row<b.h-1; row+=2){
      for(let col=1; col<b.w-1; col+=2){
        if(row>=b.h-2 && Math.abs(col-dc)<=1) continue; // evita l'area della porta
        cx.drawImage(IMG.bprops,48,64,32,36,
          ovX+col*TILE+(TILE-winW)/2, roofH+row*TILE+(TILE-winH)/2, winW,winH);
      }
    }

    // ── Porta (Door2: 32,20,32,44) ──
    const doorW=TILE*2, doorH=TILE*2.5;
    cx.fillStyle='#0a0808'; cx.fillRect(ovX+dc*TILE+4, roofH+bh-doorH*0.7, doorW-8, doorH*0.7); // vano scuro
    cx.drawImage(IMG.bprops,32,20,32,44,
      ovX+dc*TILE, roofH+bh-doorH, doorW,doorH);

    // ── Roof (procedural, a falde, colorato per tipo: studi/lavoro/progetti) ──
    const rc=b.colorRgb.split(',').map(Number);
    const shade=f=>`rgb(${rc.map(v=>Math.max(0,Math.min(255,Math.round(v*f)))).join(',')})`;
    const inset=Math.round(bw*0.16);
    const ridgeY=8, baseY=roofH;          // baseY = quota superiore dei muri
    // Falda principale (trapezio) con ombreggiatura a tegole
    cx.save();
    cx.beginPath();
    cx.moveTo(1,baseY); cx.lineTo(inset,ridgeY);
    cx.lineTo(cw-inset,ridgeY); cx.lineTo(cw-1,baseY); cx.closePath();
    cx.clip();
    cx.fillStyle=shade(.50); cx.fillRect(0,0,cw,baseY);
    cx.fillStyle=shade(.34);
    for(let yy=ridgeY+5; yy<baseY; yy+=6) cx.fillRect(0,yy,cw,1);   // righe tegole
    cx.fillStyle=shade(.72); cx.fillRect(inset,ridgeY,cw-2*inset,3); // colmo
    cx.restore();
    // Gronda / fascia inferiore (copre il bordo dei muri → niente gap)
    cx.fillStyle=shade(.30); cx.fillRect(1,baseY-5,cw-2,7);
    // Contorno
    cx.strokeStyle=shade(.20); cx.lineWidth=2;
    cx.beginPath();
    cx.moveTo(1,baseY-1); cx.lineTo(inset,ridgeY);
    cx.lineTo(cw-inset,ridgeY); cx.lineTo(cw-1,baseY-1); cx.closePath(); cx.stroke();

    // ── Planter from Props (101,100,22,20) next to door ──
    cx.drawImage(IMG.bprops,101,100,22,20, ovX+(dc-1)*TILE, roofH+bh-TILE*0.8, TILE*0.8,TILE*0.7);
    cx.drawImage(IMG.bprops,101,100,22,20, ovX+(dc+2)*TILE+4, roofH+bh-TILE*0.8, TILE*0.8,TILE*0.7);

    bldgSprites.push({
      canvas:cv,
      dx: b.x*TILE - ovX,
      dy: b.y*TILE - roofH,
      sortY: (b.y+b.h-1)*TILE+TILE,
    });
  });
}

// ═══ CHARACTER (Walk: 6×64x64, Idle: 4×64x64) ═══
const CSCALE=2.8;
const CDW=Math.round(64*CSCALE);

function drawChar(dir,frame,moving){
  let sheet,fx,flip=false;
  if(moving){
    fx=frame%6;
    if(dir===2)sheet=IMG.walkD;
    else if(dir===0)sheet=IMG.walkU;
    else if(dir===1){sheet=IMG.walkS;}
    else{sheet=IMG.walkS;flip=true;}
  }else{
    fx=frame%4;
    if(dir===2)sheet=IMG.idleD;
    else if(dir===0)sheet=IMG.idleU;
    else if(dir===1){sheet=IMG.idleS;}
    else{sheet=IMG.idleS;flip=true;}
  }
  if(!sheet)return;
  ctx.save();
  if(flip){
    ctx.scale(-1,1);
    ctx.drawImage(sheet,fx*64,0,64,64,-CDW/2,-CDW*0.82,CDW,CDW);
  }else{
    ctx.drawImage(sheet,fx*64,0,64,64,-CDW/2,-CDW*0.82,CDW,CDW);
  }
  ctx.restore();
}

// ═══ PARTICLES ═══
class Particle{
  constructor(x,y,type,extra){
    this.x=x;this.y=y;this.type=type;this.life=0;this.extra=extra||{};
    if(type==='firefly'){
      this.phase=Math.random()*Math.PI*2;this.phaseY=Math.random()*Math.PI*2;
      this.speed=0.15+Math.random()*0.25;this.brightness=Math.random();
      this.size=1.5+Math.random()*1.5;this.maxLife=8+Math.random()*12;
      this.hue=50+Math.random()*60;this.ox=x;this.oy=y;
      this.rx=12+Math.random()*20;this.ry=8+Math.random()*12;
    }else if(type==='ripple'){
      this.r=2;this.maxR=12+Math.random()*8;this.maxLife=1.4+Math.random()*0.6;
    }else if(type==='leaf'){
      this.vx=(Math.random()-0.5)*0.5;this.vy=0.3+Math.random()*0.4;
      this.rot=Math.random()*Math.PI*2;this.rotV=(Math.random()-0.5)*0.08;
      this.size=2+Math.random()*2;this.maxLife=4+Math.random()*3;
      this.color=['#2a4510','#3a5518','#1e3008','#4a6020'][Math.floor(Math.random()*4)];
    }else if(type==='spark'){
      this.vx=(Math.random()-0.5)*1.5;this.vy=-1-Math.random()*2;
      this.size=1+Math.random()*1.5;this.maxLife=0.8+Math.random()*0.6;
      this.hue=this.extra.hue||120;
    }
  }
  update(dt,t){
    this.life+=dt;
    if(this.type==='firefly'){
      this.x=this.ox+Math.sin(t*this.speed+this.phase)*this.rx;
      this.y=this.oy+Math.sin(t*this.speed*0.7+this.phaseY)*this.ry;
      this.brightness=0.4+0.6*Math.abs(Math.sin(t*2.5+this.phase));
    }else if(this.type==='ripple'){
      const p=this.life/this.maxLife;this.r=2+p*this.maxR;this.alpha=0.5*(1-p);
    }else if(this.type==='leaf'){
      this.x+=this.vx+Math.sin(this.life*2)*0.2;this.y+=this.vy;this.rot+=this.rotV;
    }else if(this.type==='spark'){
      this.x+=this.vx;this.y+=this.vy;this.vy+=3*dt;
    }
  }
  isDead(){return this.life>this.maxLife;}
  draw(camX,camY){
    const sx=this.x-camX,sy=this.y-camY;
    if(sx<-30||sx>CW+30||sy<-30||sy>CH+30)return;
    ctx.save();
    if(this.type==='firefly'){
      ctx.globalAlpha=this.brightness*0.8;
      ctx.fillStyle=`hsl(${this.hue},100%,70%)`;
      ctx.beginPath();ctx.arc(sx,sy,this.size,0,Math.PI*2);ctx.fill();
      ctx.globalAlpha=this.brightness*0.3;
      ctx.beginPath();ctx.arc(sx,sy,this.size*3,0,Math.PI*2);ctx.fill();
    }else if(this.type==='ripple'){
      ctx.globalAlpha=this.alpha;
      ctx.strokeStyle='rgba(100,180,255,0.8)';ctx.lineWidth=1;
      ctx.beginPath();ctx.arc(sx,sy,this.r,0,Math.PI*2);ctx.stroke();
    }else if(this.type==='leaf'){
      ctx.globalAlpha=Math.min(1,Math.min(this.life*2,this.maxLife-this.life));
      ctx.translate(sx,sy);ctx.rotate(this.rot);
      ctx.fillStyle=this.color;ctx.fillRect(-this.size/2,-this.size/2,this.size,this.size);
    }else if(this.type==='spark'){
      const a=1-this.life/this.maxLife;
      ctx.globalAlpha=a;
      ctx.fillStyle=`hsl(${this.hue},100%,70%)`;
      ctx.beginPath();ctx.arc(sx,sy,this.size*a,0,Math.PI*2);ctx.fill();
    }
    ctx.restore();
  }
}

const particles=[];
let ffSpawn=0,rpSpawn=0,lfSpawn=0,skSpawn=0,waterPosCache=null;
const treePosCache=[];

function spawnParticles(dt,t){
  if(customMode)return; // niente particelle procedurali sulle mappe custom
  if(!treePosCache.length){
    for(let ty=0;ty<MH;ty++)for(let tx=0;tx<MW;tx++)
      if(MAP[ty][tx]===T.TR&&ty>2&&ty<MH-2)treePosCache.push({x:tx*TILE+16,y:ty*TILE+16});
    const s=treePosCache.filter((_,i)=>i%5===0).slice(0,35);
    treePosCache.length=0;treePosCache.push(...s);
  }
  ffSpawn-=dt;
  if(ffSpawn<=0&&particles.filter(p=>p.type==='firefly').length<20){
    const tp=treePosCache[Math.floor(Math.random()*treePosCache.length)];
    if(tp)particles.push(new Particle(tp.x+(Math.random()-.5)*48,tp.y+(Math.random()-.5)*32,'firefly'));
    ffSpawn=1+Math.random()*1.5;
  }
  rpSpawn-=dt;
  if(rpSpawn<=0){
    if(!waterPosCache){waterPosCache=[];for(let ty=0;ty<MH;ty++)for(let tx=0;tx<MW;tx++)if(MAP[ty][tx]===T.W)waterPosCache.push([tx,ty]);}
    for(const[wx,wy]of waterPosCache)
      if(Math.random()<.03)particles.push(new Particle(wx*TILE+8+Math.random()*16,wy*TILE+8+Math.random()*16,'ripple'));
    rpSpawn=.6+Math.random();
  }
  lfSpawn-=dt;
  if(lfSpawn<=0){
    const tp=treePosCache[Math.floor(Math.random()*treePosCache.length)];
    if(tp)particles.push(new Particle(tp.x+(Math.random()-.5)*16,tp.y,'leaf'));
    lfSpawn=.5+Math.random();
  }
  skSpawn-=dt;
  if(skSpawn<=0){
    const hues=[120,190,300];
    buildings.forEach((b,i)=>{
      if(Math.random()<.35){
        const dc=b.x+Math.floor(b.w/2);
        particles.push(new Particle((dc+.5)*TILE+(Math.random()-.5)*20,(b.y+b.h-1)*TILE+Math.random()*10,'spark',{hue:hues[i]}));
      }
    });
    skSpawn=.2+Math.random()*.3;
  }
  for(let i=particles.length-1;i>=0;i--){particles[i].update(dt,t);if(particles[i].isDead())particles.splice(i,1);}
}

// ═══ LIGHTING (bright - subtle ambient) ═══
const lc=document.createElement('canvas');lc.width=CW;lc.height=CH;
const lx=lc.getContext('2d');

function renderLighting(camX,camY,ppx,ppy,t){
  lx.clearRect(0,0,CW,CH);
  lx.fillStyle=(theme&&theme.night)?'rgba(6,9,30,0.55)':'rgba(5,8,25,0.15)';
  lx.fillRect(0,0,CW,CH);
  lx.globalCompositeOperation='destination-out';
  // Player
  let g=lx.createRadialGradient(ppx,ppy,0,ppx,ppy,120);
  g.addColorStop(0,'rgba(0,0,0,0.5)');g.addColorStop(1,'rgba(0,0,0,0)');
  lx.fillStyle=g;lx.beginPath();lx.arc(ppx,ppy,120,0,Math.PI*2);lx.fill();
  // Building door glows
  buildings.forEach((b,i)=>{
    const dc=b.x+Math.floor(b.w/2);
    const fl=.8+.2*Math.sin(t*4+i*2);
    const dx=(dc+1)*TILE-camX,dy=(b.y+b.h-.5)*TILE-camY;
    g=lx.createRadialGradient(dx,dy,0,dx,dy,80*fl);
    g.addColorStop(0,'rgba(0,0,0,0.4)');g.addColorStop(1,'rgba(0,0,0,0)');
    lx.fillStyle=g;lx.beginPath();lx.arc(dx,dy,80*fl,0,Math.PI*2);lx.fill();
  });
  lx.globalCompositeOperation='source-over';
  ctx.drawImage(lc,0,0);
  // Neon color tints
  ctx.save();ctx.globalCompositeOperation='screen';
  buildings.forEach((b,i)=>{
    const dc=b.x+Math.floor(b.w/2);
    const fl=.8+.2*Math.sin(t*4+i*2);
    const dx=(dc+1)*TILE-camX,dy=(b.y+b.h-.5)*TILE-camY;
    g=ctx.createRadialGradient(dx,dy,0,dx,dy,70);
    g.addColorStop(0,`rgba(${b.colorRgb},${.18*fl})`);g.addColorStop(1,`rgba(${b.colorRgb},0)`);
    ctx.fillStyle=g;ctx.beginPath();ctx.arc(dx,dy,70,0,Math.PI*2);ctx.fill();
  });
  ctx.restore();
}

function getTile(tx,ty){const x=Math.floor(tx),y=Math.floor(ty);if(x<0||x>=MW||y<0||y>=MH)return T.TR;return MAP[y][x];}
function solid(x,y){
  if(customMode){const tx=Math.floor(x/TILE),ty=Math.floor(y/TILE); if(tx<0||ty<0||tx>=MW||ty>=MH)return true; return customSolid[ty][tx];}
  return SOLID.has(getTile(x/TILE,y/TILE));
}
function canMove(nx,ny){const m=7;return !solid(nx-m,ny-m)&&!solid(nx+m,ny-m)&&!solid(nx-m,ny+m+4)&&!solid(nx+m,ny+m+4);}
function nearDoorInfo(){
  const tx=Math.floor(player.x/TILE),ty=Math.floor(player.y/TILE);
  for(let dy=-2;dy<=2;dy++)for(let dx=-2;dx<=2;dx++)
    if(getTile(tx+dx,ty+dy)===T.DR){const bi=getBuildingByDoor(tx+dx,ty+dy);if(bi>=0)return bi;}
  return -1;
}

// ═══ CONTROLLI TOUCH (mobile) ═══
if('ontouchstart' in window || navigator.maxTouchPoints>0) document.body.classList.add('touch');
(function setupTouch(){
  const joyBase=document.getElementById('joyBase'), joyKnob=document.getElementById('joyKnob'), btnEnter=document.getElementById('btnEnter');
  if(!joyBase) return;
  btnEnterEl=btnEnter;
  const R=48; // corsa massima del knob (px)
  const setKnob=(x,y)=>joyKnob.style.transform=`translate(${x}px,${y}px)`;
  const findTouch=e=>{for(const t of e.changedTouches)if(t.identifier===touchMove.id)return t;return null;};
  function start(e){const t=e.changedTouches[0];touchMove.id=t.identifier;touchMove.active=true;move(e);e.preventDefault();}
  function move(e){
    if(!touchMove.active)return;
    const t=findTouch(e); if(!t)return;
    const r=joyBase.getBoundingClientRect(), cx=r.left+r.width/2, cy=r.top+r.height/2;
    let dx=t.clientX-cx, dy=t.clientY-cy; const d=Math.hypot(dx,dy)||1;
    if(d>R){dx=dx/d*R; dy=dy/d*R;}
    setKnob(dx,dy); touchMove.x=dx/R; touchMove.y=dy/R; e.preventDefault();
  }
  function end(e){ if(findTouch(e)){touchMove.active=false;touchMove.x=0;touchMove.y=0;touchMove.id=null;setKnob(0,0);} }
  joyBase.addEventListener('touchstart',start,{passive:false});
  joyBase.addEventListener('touchmove',move,{passive:false});
  joyBase.addEventListener('touchend',end); joyBase.addEventListener('touchcancel',end);
  // Pulsante "Entra": apre i dettagli dell'edificio vicino, o chiude il modale
  const act=()=>{ if(modalOpen){closeModal();return;} if(hintBldg>=0)openModal(hintBldg); };
  btnEnter.addEventListener('touchstart',e=>{e.preventDefault();act();},{passive:false});
  btnEnter.addEventListener('click',act);
})();

// ═══ UPDATE ═══
let waterFrame=0,waterAccum=0;
function update(dt){
  time+=dt;waterAccum+=dt;
  if(waterAccum>.12){waterFrame=(waterFrame+1)%6;waterAccum=0;}
  updateShake(dt);spawnParticles(dt,time);
  if(modalOpen){Object.keys(justP).forEach(k=>delete justP[k]);return;}
  if(editMode){ // in modifica: le frecce/WASD spostano la telecamera, niente giocatore
    let dx=0,dy=0;
    if(keys.ArrowUp||keys.w||keys.W)dy=-1; if(keys.ArrowDown||keys.s||keys.S)dy=1;
    if(keys.ArrowLeft||keys.a||keys.A)dx=-1; if(keys.ArrowRight||keys.d||keys.D)dx=1;
    cam.x=Math.max(0,Math.min(Math.max(0,MW*TILE-CW),cam.x+dx*7));
    cam.y=Math.max(0,Math.min(Math.max(0,MH*TILE-CH),cam.y+dy*7));
    Object.keys(justP).forEach(k=>delete justP[k]); return;
  }
  let dx=0,dy=0;
  if(keys.ArrowUp||keys.w||keys.W)dy=-1;
  if(keys.ArrowDown||keys.s||keys.S)dy=1;
  if(keys.ArrowLeft||keys.a||keys.A)dx=-1;
  if(keys.ArrowRight||keys.d||keys.D)dx=1;
  if(dx&&dy){dx*=.707;dy*=.707;}
  // Joystick touch: ha priorità sulla tastiera (vettore analogico, intensità = spinta)
  if(touchMove.active&&(touchMove.x||touchMove.y)){dx=touchMove.x;dy=touchMove.y;}
  player.moving=Math.abs(dx)>0.01||Math.abs(dy)>0.01;
  if(dy<0)player.dir=0;else if(dy>0)player.dir=2;else if(dx>0)player.dir=1;else if(dx<0)player.dir=3;
  const nx=player.x+dx*player.spd,ny=player.y+dy*player.spd;
  if(canMove(nx,player.y))player.x=nx;
  if(canMove(player.x,ny))player.y=ny;
  player.x=Math.max(TILE*2+8,Math.min(MW*TILE-TILE*2-8,player.x));
  player.y=Math.max(TILE*2+8,Math.min(MH*TILE-TILE*2-8,player.y));
  if(player.moving){player.ft+=dt;if(player.ft>.1){player.frame=(player.frame+1)%6;player.ft=0;}player.iFt=0;player.iFrame=0;}
  else{player.frame=0;player.ft=0;player.iFt+=dt;if(player.iFt>.25){player.iFrame=(player.iFrame+1)%4;player.iFt=0;}}
  hintBldg=customMode?nearPortal():nearDoorInfo();
  if(btnEnterEl) btnEnterEl.classList.toggle('dim',hintBldg<0);
  if(justP.e||justP.E||justP[' ']){if(hintBldg>=0)openModal(hintBldg);}
  Object.keys(justP).forEach(k=>delete justP[k]);
  updateCam();
  const ptx=Math.floor(player.x/TILE),pty=Math.floor(player.y/TILE);
  document.getElementById('posLabel').textContent=`(${ptx},${pty})`;
  let zone='Mappa principale';
  for(const b of buildings)if(ptx>=b.x-1&&ptx<=b.x+b.w&&pty>=b.y-1&&pty<=b.y+b.h+2){zone=b.name;break;}
  document.getElementById('zoneLabel').textContent=zone;
}

function drawPortal(b,cx,cy){
  const px=(b.x+.5)*TILE-cx, py=(b.y+1)*TILE-cy, pulse=.7+.3*Math.sin(time*3+b.x);
  ctx.save();
  ctx.globalAlpha=.45*pulse; ctx.fillStyle=b.color;
  ctx.beginPath();ctx.ellipse(px,py-2,15,7,0,0,Math.PI*2);ctx.fill();
  ctx.globalAlpha=1;
  ctx.fillStyle=b.colorDim; ctx.fillRect(px-4,py-30,8,30);
  ctx.shadowColor=b.color;ctx.shadowBlur=14*pulse;ctx.fillStyle=b.color;
  ctx.beginPath();ctx.arc(px,py-34,8,0,Math.PI*2);ctx.fill();
  ctx.restore();
  // targhetta nome
  const nm=b.name||''; if(!nm)return;
  const rc=b.colorRgb.split(',').map(Number), light=rc.map(v=>Math.round(v+(255-v)*.4)).join(',');
  ctx.save();ctx.font='9px "Nunito", sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';
  const tw=ctx.measureText(nm).width, pw=tw+14, ph=18, ly=py-52;
  ctx.fillStyle='rgba(3,7,12,.82)';ctx.fillRect(px-pw/2,ly-ph/2,pw,ph);
  ctx.strokeStyle=`rgba(${b.colorRgb},.7)`;ctx.lineWidth=1.5;ctx.strokeRect(px-pw/2,ly-ph/2,pw,ph);
  ctx.lineWidth=3;ctx.strokeStyle='rgba(0,0,0,.9)';ctx.strokeText(nm,px,ly);
  ctx.fillStyle=`rgb(${light})`;ctx.fillText(nm,px,ly);
  ctx.restore();
}
function renderCustom(cx,cy){
  ctx.fillStyle=CUSTOM.bg||'#3a6830';ctx.fillRect(0,0,CW,CH);
  for(const layer of CUSTOM.layers){
    for(const c of layer){
      const img=IMG['cs'+c[2]]; if(!img||!img.naturalWidth)continue;
      const dw=Math.round(c[5]/16*TILE), dh=Math.round(c[6]/16*TILE);
      const dx=c[0]*TILE-cx, dy=c[1]*TILE-cy;
      if(dx>CW||dy>CH||dx+dw<0||dy+dh<0)continue;
      ctx.drawImage(img,c[3],c[4],c[5],c[6],dx,dy,dw,dh);
    }
  }
  const ppx=Math.round(player.x-cx),ppy=Math.round(player.y-cy);
  const realB=bldgSprites.length>0;
  const objs=[];
  if(realB) bldgSprites.forEach((bs,i)=>objs.push({t:'b',i,sortY:bs.sortY}));
  else buildings.forEach((b,i)=>objs.push({t:'p',i,sortY:(b.y+1)*TILE}));
  customProps.forEach(p=>objs.push({t:'prop',p,sortY:(p[1]+1)*TILE}));
  objs.push({t:'me',sortY:player.y+4});
  objs.sort((a,b)=>a.sortY-b.sortY);
  for(const o of objs){
    if(o.t==='b'){const bs=bldgSprites[o.i]; ctx.drawImage(bs.canvas,bs.dx-cx,bs.dy-cy);}
    else if(o.t==='prop'){const p=o.p; if(p[2]===0)drawTreeSprite(p[0],p[1],cx,cy); else if(p[2]===1)drawRock(p[0],p[1],cx,cy); else drawVeg(p[0],p[1],cx,cy);}
    else if(o.t==='p') drawPortal(buildings[o.i],cx,cy);
    else{
      ctx.save();ctx.globalAlpha=.2;ctx.fillStyle='#000';ctx.beginPath();ctx.ellipse(ppx,ppy+4,12,5,0,0,Math.PI*2);ctx.fill();ctx.restore();
      ctx.save();ctx.translate(ppx,ppy);drawChar(player.dir,player.moving?player.frame:player.iFrame,player.moving);ctx.restore();
    }
  }
  if(realB) buildings.forEach((b,i)=>{ const bx=b.x*TILE-cx,by=b.y*TILE-cy; if(bx<-400||bx>CW+400)return;
    const pulse=.85+.15*Math.sin(time*2.5+i*2), rc=b.colorRgb.split(',').map(Number), light=rc.map(v=>Math.round(v+(255-v)*.4)).join(',');
    const midX=bx+b.w*TILE/2, plateY=by-TILE*2.6;
    ctx.save();ctx.font='10px "Nunito", sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';
    const tw=ctx.measureText(b.name).width,pw=tw+16,ph=20;
    ctx.fillStyle='rgba(3,7,12,.82)';ctx.fillRect(midX-pw/2,plateY-ph/2,pw,ph);
    ctx.strokeStyle=`rgba(${b.colorRgb},${.75*pulse})`;ctx.lineWidth=1.5;ctx.strokeRect(midX-pw/2,plateY-ph/2,pw,ph);
    ctx.lineWidth=3.5;ctx.strokeStyle='rgba(0,0,0,.92)';ctx.strokeText(b.name,midX,plateY);
    ctx.fillStyle=`rgba(${light},${pulse})`;ctx.fillText(b.name,midX,plateY);ctx.restore(); });
  if(hintBldg>=0&&!modalOpen){const b=buildings[hintBldg];
    ctx.save();ctx.shadowColor=b.color;ctx.shadowBlur=10;
    ctx.fillStyle='rgba(0,5,1,.88)';ctx.fillRect(ppx-58,ppy-46,116,22);
    ctx.strokeStyle=b.color;ctx.lineWidth=1;ctx.strokeRect(ppx-58,ppy-46,116,22);
    ctx.fillStyle=b.color;ctx.font='5px "Press Start 2P"';ctx.textAlign='center';
    ctx.fillText(`[E] ${b.name||'ENTRA'}`,ppx,ppy-31);ctx.restore();}
  // minimappa semplice
  const mw=88,mh=Math.round(88*MH/MW),mx=CW-mw-10,my=10,sx=mw/MW,sy=mh/MW*(MW/MW);
  ctx.save();ctx.globalAlpha=.85;ctx.fillStyle='#0a1a14';ctx.fillRect(mx-1,my-1,mw+2,mh+2);
  ctx.strokeStyle='rgba(109,107,246,.6)';ctx.lineWidth=1;ctx.strokeRect(mx-1,my-1,mw+2,mh+2);
  const syv=mh/MH;
  ctx.fillStyle='rgba(120,130,160,.5)';
  for(let ty=0;ty<MH;ty++)for(let tx=0;tx<MW;tx++)if(customSolid[ty][tx])ctx.fillRect(mx+tx*sx,my+ty*syv,Math.ceil(sx),Math.ceil(syv));
  buildings.forEach(b=>{ctx.fillStyle=b.color;ctx.fillRect(mx+b.x*sx-1,my+b.y*syv-1,3,3);});
  ctx.fillStyle='#fff';ctx.fillRect(mx+(player.x/TILE)*sx-1.5,my+(player.y/TILE)*syv-1.5,3,3);
  ctx.restore();
  const vg=ctx.createRadialGradient(CW/2,CH/2,CH*.4,CW/2,CH/2,CH*1.1);vg.addColorStop(0,'rgba(0,0,0,0)');vg.addColorStop(1,'rgba(0,0,8,.28)');
  ctx.fillStyle=vg;ctx.fillRect(0,0,CW,CH);
}

function render(){
  const cx=Math.round(cam.x+shake.x),cy=Math.round(cam.y+shake.y);
  if(customMode){renderCustom(cx,cy);return;}
  ctx.fillStyle=(theme&&theme.edge)||'#3a6830';ctx.fillRect(0,0,CW,CH);
  const sx=Math.max(0,Math.floor(cx/TILE)),ex=Math.min(MW-1,Math.ceil((cx+CW)/TILE));
  const sy=Math.max(0,Math.floor(cy/TILE)),ey=Math.min(MH-1,Math.ceil((cy+CH)/TILE));

  // ── 1. FLOOR ──
  for(let ty=sy;ty<=ey;ty++)for(let tx=sx;tx<=ex;tx++){
    const t=MAP[ty][tx];
    const px=tx*TILE-cx,py=ty*TILE-cy;
    if(FLOOR_TILES.has(t)){
      ctx.drawImage(TC[t],px,py);
    }else{
      // Grass base under all objects
      const gv=((tx*374761393+ty*668265263)>>>0)%3;
      ctx.drawImage(TC[gv],px,py);
    }
  }

  // ── 2. Y-SORTED OBJECTS (buildings, trees, rocks, flowers, player) ──
  const objs=[];
  // Buildings
  bldgSprites.forEach((bs,i)=>{objs.push({type:'bldg',idx:i,sortY:bs.sortY});});
  // Trees, rocks, flowers, signs, fences
  for(let ty=sy;ty<=ey;ty++)for(let tx=sx;tx<=ex;tx++){
    const t=MAP[ty][tx];
    if(t===T.TR&&ty>1&&ty<MH-1) objs.push({type:'tree',tx,ty,sortY:ty*TILE+TILE});
    else if(t===T.RK) objs.push({type:'rock',tx,ty,sortY:ty*TILE+TILE});
    else if(t===T.FL) objs.push({type:'veg',tx,ty,sortY:ty*TILE+TILE});
    else if(t===T.SG) objs.push({type:'sign',tx,ty,sortY:ty*TILE+TILE});
    else if(t===T.FN) objs.push({type:'fence',tx,ty,sortY:ty*TILE+TILE});
  }
  // Player
  const ppx=Math.round(player.x-cx),ppy=Math.round(player.y-cy);
  objs.push({type:'player',sortY:player.y+4});
  objs.sort((a,b)=>a.sortY-b.sortY);

  for(const o of objs){
    if(o.type==='bldg'){
      const bs=bldgSprites[o.idx];
      ctx.drawImage(bs.canvas, bs.dx-cx, bs.dy-cy);
    }else if(o.type==='tree'){
      drawTreeSprite(o.tx,o.ty,cx,cy);
    }else if(o.type==='rock'){
      drawRock(o.tx,o.ty,cx,cy);
    }else if(o.type==='veg'){
      drawVeg(o.tx,o.ty,cx,cy);
    }else if(o.type==='sign'){
      drawSign(o.tx,o.ty,cx,cy);
    }else if(o.type==='fence'){
      const px=o.tx*TILE-cx,py=o.ty*TILE-cy;
      ctx.drawImage(TC[T.G],px,py);
      ctx.drawImage(IMG.bprops,4,96,24,32, px,py-8,TILE,TILE+8);
    }else if(o.type==='player'){
      // Shadow
      ctx.save();ctx.globalAlpha=.2;ctx.fillStyle='#000';
      ctx.beginPath();ctx.ellipse(ppx,ppy+4,12,5,0,0,Math.PI*2);ctx.fill();ctx.restore();
      // Sprite
      ctx.save();ctx.translate(ppx,ppy);
      if(player.moving)drawChar(player.dir,player.frame,true);
      else drawChar(player.dir,player.iFrame,false);
      ctx.restore();
    }
  }

  // ── 3. WATER RIPPLE PARTICLES ──
  particles.filter(p=>p.type==='ripple').forEach(p=>p.draw(cx,cy));

  // ── 3b. TINTA DEL TEMA (atmosfera: bosco/notte/deserto/neve) ──
  if(theme&&theme.tint){ctx.fillStyle=theme.tint;ctx.fillRect(0,0,CW,CH);}

  // ── 4. NEON SIGNS / NAME PLATES (above buildings) ──
  buildings.forEach((b,i)=>{
    const bx=b.x*TILE-cx,by=b.y*TILE-cy;
    if(bx<-400||bx>CW+400)return;
    const pulse=.85+.15*Math.sin(time*2.5+i*2);     // pulsazione lieve → testo sempre leggibile
    const rc=b.colorRgb.split(',').map(Number);
    const light=rc.map(v=>Math.round(v+(255-v)*0.4)).join(','); // versione schiarita per il testo
    const midX=bx+b.w*TILE/2, plateY=by-TILE*2.6;
    ctx.save();
    // contorno neon attorno all'edificio (sottile)
    ctx.shadowColor=b.color;ctx.shadowBlur=10*pulse;
    ctx.strokeStyle=`rgba(${b.colorRgb},${.35*pulse})`;ctx.lineWidth=1.5;
    ctx.strokeRect(bx,by,b.w*TILE,b.h*TILE);
    ctx.shadowBlur=0;
    // targhetta + testo
    ctx.font='10px "Press Start 2P"';ctx.textAlign='center';ctx.textBaseline='middle';
    const tw=ctx.measureText(b.name).width, padX=8, plateW=tw+padX*2, plateH=20;
    ctx.fillStyle='rgba(3,7,12,.82)';
    ctx.fillRect(midX-plateW/2,plateY-plateH/2,plateW,plateH);
    ctx.strokeStyle=`rgba(${b.colorRgb},${.75*pulse})`;ctx.lineWidth=1.5;
    ctx.strokeRect(midX-plateW/2,plateY-plateH/2,plateW,plateH);
    // testo: contorno nero per leggibilità + riempimento brillante + bagliore
    ctx.lineWidth=3.5;ctx.strokeStyle='rgba(0,0,0,.92)';
    ctx.strokeText(b.name,midX,plateY);
    ctx.shadowColor=b.color;ctx.shadowBlur=8*pulse;
    ctx.fillStyle=`rgba(${light},${pulse})`;
    ctx.fillText(b.name,midX,plateY);
    ctx.restore();
  });

  // ── 5. AIR PARTICLES ──
  particles.filter(p=>p.type!=='ripple').forEach(p=>p.draw(cx,cy));

  // ── 6. LIGHTING ──
  renderLighting(cx,cy,ppx,ppy,time);

  // ── 7. INTERACT HINT ──
  if(hintBldg>=0&&!modalOpen){
    const b=buildings[hintBldg];
    ctx.save();ctx.shadowColor=b.color;ctx.shadowBlur=10;
    ctx.fillStyle='rgba(0,5,1,.88)';ctx.fillRect(ppx-58,ppy-44,116,22);
    ctx.strokeStyle=b.color;ctx.lineWidth=1;ctx.strokeRect(ppx-58,ppy-44,116,22);
    ctx.fillStyle=b.color;ctx.font='5px "Press Start 2P"';ctx.textAlign='center';
    ctx.fillText(`[E] ${b.name}`,ppx,ppy-29);ctx.restore();
  }

  // ── 8. MINIMAP ──
  drawMinimap(cx,cy);

  // ── 9. VIGNETTE ──
  const vg=ctx.createRadialGradient(CW/2,CH/2,CH*.35,CW/2,CH/2,CH*1.1);
  vg.addColorStop(0,'rgba(0,0,0,0)');vg.addColorStop(1,'rgba(0,0,8,.25)');
  ctx.fillStyle=vg;ctx.fillRect(0,0,CW,CH);

  // ── MODALITÀ MODIFICA: contorni edifici + banner ──
  if(editMode){
    buildings.forEach(b=>{const bx=b.x*TILE-cx,by=(b.y-2)*TILE-cy,bw=b.w*TILE,bh=(b.h+2)*TILE;
      ctx.save();ctx.setLineDash([6,4]);ctx.strokeStyle=`rgba(${b.colorRgb},.9)`;ctx.lineWidth=2;ctx.strokeRect(bx,by,bw,bh);ctx.restore();});
    ctx.save();ctx.fillStyle='rgba(109,107,246,.94)';ctx.fillRect(0,0,CW,26);
    ctx.fillStyle='#fff';ctx.font='bold 12px "Nunito",system-ui,sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText('✏️ MODIFICA · trascina gli edifici · clicca per modificare · ➕ aggiungi · 💾 salva',CW/2,13);ctx.restore();
  }
}

function drawMinimap(cx,cy){
  const mw=88,mh=55,mx=CW-mw-10,my=10;
  const sxm=mw/(MW*TILE),sym=mh/(MH*TILE);
  ctx.save();ctx.globalAlpha=.85;
  ctx.fillStyle='#0a1a08';ctx.fillRect(mx-1,my-1,mw+2,mh+2);
  ctx.strokeStyle='rgba(0,255,65,.5)';ctx.lineWidth=1;ctx.strokeRect(mx-1,my-1,mw+2,mh+2);
  const cols={[T.G]:'#2a5020',[T.G2]:'#2c5222',[T.G3]:'#285020',[T.P]:'#5a4a30',
    [T.W]:'#2060aa',[T.TR]:'#1a3a10',[T.WL]:'#3a2a18',[T.DR]:'#00FF41',
    [T.RK]:'#484848',[T.FL]:'#2a5020',[T.SG]:'#3a2a18',[T.RF]:'#252030',
    [T.FN]:'#3a2810',[T.BRG]:'#5a4a30'};
  for(let ty=0;ty<MH;ty++)for(let tx=0;tx<MW;tx++){
    ctx.fillStyle=cols[MAP[ty][tx]]||'#2a5020';
    ctx.fillRect(mx+tx*sxm*TILE,my+ty*sym*TILE,Math.ceil(sxm*TILE)+.5,Math.ceil(sym*TILE)+.5);
  }
  buildings.forEach(b=>{
    const dc=b.x+Math.floor(b.w/2);
    ctx.fillStyle=b.color;
    ctx.fillRect(mx+dc*sxm*TILE,my+(b.y+b.h-1)*sym*TILE,Math.ceil(sxm*TILE*2),Math.ceil(sym*TILE));
  });
  ctx.strokeStyle='rgba(255,255,255,.15)';ctx.lineWidth=.5;
  ctx.strokeRect(mx+cx*sxm,my+cy*sym,CW*sxm,CH*sym);
  ctx.fillStyle='#fff';ctx.fillRect(mx+player.x*sxm-1.5,my+player.y*sym-1.5,3,3);
  ctx.restore();
}

// ═══ GAME LOOP ═══
let last=0;
function loop(ts){
  const dt=Math.min((ts-last)/1000,.05);last=ts;
  update(dt);render();requestAnimationFrame(loop);
}

// ═══════════ MODALITÀ MODIFICA (sposta/aggiungi/modifica/elimina edifici) ═══════════
let dragI=-1,dragOX=0,dragOY=0,dragMoved=false,editPanelOpen=false,editI=-1;
const $ed=id=>document.getElementById(id);
function canvasToWorld(clientX,clientY){const r=canvas.getBoundingClientRect();const px=(clientX-r.left)*(canvas.width/r.width)+Math.round(cam.x),py=(clientY-r.top)*(canvas.height/r.height)+Math.round(cam.y);return{tx:px/TILE,ty:py/TILE};}
function buildingAt(tx,ty){for(let i=buildings.length-1;i>=0;i--){const b=buildings[i];if(tx>=b.x-0.5&&tx<=b.x+b.w+0.5&&ty>=b.y-2.5&&ty<=b.y+b.h+0.5)return i;}return -1;}
function updateSpritePos(i){const b=buildings[i],bs=bldgSprites[i];if(!bs)return;bs.dx=b.x*TILE-TILE;bs.dy=b.y*TILE-Math.round(TILE*2.5);bs.sortY=(b.y+b.h-1)*TILE+TILE;}
function edDown(cx,cy){if(!editMode||modalOpen||editPanelOpen)return false;const w=canvasToWorld(cx,cy),i=buildingAt(w.tx,w.ty);if(i>=0){dragI=i;dragOX=w.tx-buildings[i].x;dragOY=w.ty-buildings[i].y;dragMoved=false;return true;}return false;}
function edMove(cx,cy){if(dragI<0)return;const w=canvasToWorld(cx,cy),b=buildings[dragI];const nx=Math.max(2,Math.min(MW-b.w-2,Math.round(w.tx-dragOX))),ny=Math.max(3,Math.min(MH-b.h-3,Math.round(w.ty-dragOY)));if(nx!==b.x||ny!==b.y){b.x=nx;b.y=ny;b.doorX=b.x+Math.floor(b.w/2);b.doorY=b.y+b.h-1;dragMoved=true;updateSpritePos(dragI);}}
function edUp(){if(dragI<0)return;const i=dragI;dragI=-1;if(dragMoved){rebuildAfterEdit();syncScene();}else openEditPanel(i);}
canvas.addEventListener('mousedown',e=>{if(edDown(e.clientX,e.clientY))e.preventDefault();});
window.addEventListener('mousemove',e=>{if(dragI>=0)edMove(e.clientX,e.clientY);});
window.addEventListener('mouseup',edUp);
canvas.addEventListener('touchstart',e=>{if(editMode&&e.touches[0]&&edDown(e.touches[0].clientX,e.touches[0].clientY))e.preventDefault();},{passive:false});
canvas.addEventListener('touchmove',e=>{if(dragI>=0&&e.touches[0]){edMove(e.touches[0].clientX,e.touches[0].clientY);e.preventDefault();}},{passive:false});
canvas.addEventListener('touchend',edUp);

function openEditPanel(i){editI=i;editPanelOpen=true;const e=buildings[i].exp;
  $ed('epOrg').value=e.organization||'';$ed('epTitle').value=e.title||'';$ed('epKind').value=e.kind||'work';
  $ed('epStart').value=e.start||'';$ed('epEnd').value=e.end||'';$ed('epDesc').value=e.description||'';
  $ed('epTags').value=(e.tags||[]).join(', ');$ed('epLink').value=e.link||'';$ed('editPanel').classList.add('open');}
function closeEditPanel(){editPanelOpen=false;$ed('editPanel').classList.remove('open');}
function saveEditPanel(){if(editI<0)return;const b=buildings[editI],e=b.exp;
  e.organization=$ed('epOrg').value.trim();e.title=$ed('epTitle').value.trim();e.kind=$ed('epKind').value;
  e.start=$ed('epStart').value.trim();e.end=$ed('epEnd').value.trim();e.description=$ed('epDesc').value.trim();
  e.tags=$ed('epTags').value.split(',').map(t=>t.trim()).filter(Boolean);e.link=$ed('epLink').value.trim();
  refreshBuilding(b,editI);rebuildAfterEdit();syncScene();closeEditPanel();}
function deleteBuilding(){if(editI<0)return;if(!confirm('Eliminare questo edificio?'))return;buildings.splice(editI,1);editI=-1;closeEditPanel();rebuildAfterEdit();syncScene();}
function addBuilding(){const e={kind:'work',organization:'Nuovo edificio',title:'',location:'',start:'',end:'',description:'',tags:[],link:''};
  const b=makeBuilding(e,buildings.length,makeRng((seedBase^(buildings.length+7))>>>0));
  b.x=Math.max(2,Math.min(MW-b.w-2,Math.floor((cam.x+CW/2)/TILE-b.w/2)));b.y=Math.max(3,Math.min(MH-b.h-3,Math.floor((cam.y+CH/2)/TILE-b.h/2)));
  buildings.push(b);rebuildAfterEdit();syncScene();openEditPanel(buildings.length-1);}
function flashBtn(el,txt){if(!el)return;const o=el.textContent;el.textContent=txt;setTimeout(()=>el.textContent=o,1400);}
function saveWorld(){syncScene();try{localStorage.setItem('pw_scene',JSON.stringify(SCENE));}catch(e){}try{history.replaceState(null,'','#'+encodeShare(experiences,worldVariant,TILESET_BASE,SCENE));}catch(e){}flashBtn($ed('editSave'),'✓ Salvato');}
function setEditUI(){const tb=$ed('editBar');if(tb)tb.style.display=editMode?'flex':'none';document.body.classList.toggle('editing',editMode);}
function toggleEdit(){editMode=!editMode;if(editMode&&(!SCENE||!SCENE.items))syncScene();closeEditPanel();setEditUI();}
$ed('editAdd')&&($ed('editAdd').onclick=addBuilding);
$ed('editSave')&&($ed('editSave').onclick=saveWorld);
$ed('editPlay')&&($ed('editPlay').onclick=()=>{editMode=false;closeEditPanel();setEditUI();});
$ed('editToggle')&&($ed('editToggle').onclick=toggleEdit);
$ed('epSave')&&($ed('epSave').onclick=saveEditPanel);
$ed('epDelete')&&($ed('epDelete').onclick=deleteBuilding);
$ed('epClose')&&($ed('epClose').onclick=closeEditPanel);

// Esporta il mondo ATTUALE (terreno + edifici + spawn) verso l'editor a tile
function exportToEditor(){
  const grass=[[32,32],[48,32],[32,48]];
  const terrain=[], props=[];   // props: [x,y,type] type 0=albero,1=roccia,2=cespuglio
  for(let y=0;y<MH;y++)for(let x=0;x<MW;x++){
    const t=MAP[y][x];
    if(t===T.P||t===T.BRG) terrain.push([x,y,0,112,32,16,16,0]);        // strada
    else if(t===T.W) terrain.push([x,y,1,336,352,16,16,1]);             // acqua (solida)
    else { const gv=((x*374761393+y*668265263)>>>0)%3, g=grass[gv]; terrain.push([x,y,0,g[0],g[1],16,16,0]); }
    if(t===T.TR)props.push([x,y,0]); else if(t===T.RK)props.push([x,y,1]); else if(t===T.FL)props.push([x,y,2]);
  }
  const bld=buildings.map(b=>({e:b.exp,x:b.x,y:b.y,w:b.w,h:b.h,kind:b.kind}));
  const spawn=[Math.max(1,Math.floor(player.x/TILE)),Math.max(1,Math.floor(player.y/TILE))];
  const map={mapW:MW,mapH:MH,layers:[{name:'Terreno',tiles:terrain},{name:'Oggetti',tiles:[]},{name:'Dettagli',tiles:[]}],buildings:bld,props,spawn};
  try{localStorage.setItem('pw_editor_map',JSON.stringify(map));}catch(e){}
  location.href='editor.html';
}

// ═══ START ═══
loadImages(()=>{
  document.getElementById('loading').style.display='none';
  buildFloorCache();
  const regenBtn=document.getElementById('regenBtn');
  if(regenBtn){ if(customMode) regenBtn.style.display='none'; else regenBtn.onclick=()=>{ buildWorld(worldVariant+1); persistVariant(); }; }
  buildWorld(initialVariant);   // costruisce edifici + mappa + sprite + giocatore + camera
  if(/[?&]toeditor\b/.test(location.href)){ exportToEditor(); return; } // apri l'editor con la mappa attuale
  setEditUI();
  requestAnimationFrame(loop);
});
</script>
